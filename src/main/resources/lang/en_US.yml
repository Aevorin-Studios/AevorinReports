# Available Placeholders (Not all placeholders work in every message):
# {reporter} - The name of the player who created the report
# {reported} - The name of the player being reported
# {target}   - The target player (often the same as reported)
# {reason}   - The reason given for the report
# {status}   - The current status of the report (e.g., Pending, Resolved)
# {color}    - The color code associated with the report's status
# {id}       - The unique numeric ID of the report
# {server}   - The server where the report was created
# {index}    - The numbering index in lists
# {total}    - Total number of reports, pages, or items
# {page}     - Current page number in a GUI
# {start}    - Starting item index on a page
# {end}      - Ending item index on a page
# {category} - The report category name
# {time}     - Cooldown time remaining
# {date}     - Date and time the report was created
#
# Supports MiniMessage tags (e.g., <rainbow>, <red>, <gradient:blue:aqua>)
# Legacy & codes are also supported.

config-version: 2

# GUI Interface Settings
# Contains all text formatting for the Report Plugin's interactive GUIs.
gui:
  # Book GUI
  # Used when gui.type is set to "book" in config.yml.
  # Note: Use '\n' to create new lines inside books!
  book:
    error_creating: "&cError creating book interface."
    reporting_header: "&4Reporting Player:\n&c{target}"
    reasons_header: "&4Reasons:"
    custom_reason: "&c• Custom Reason"
    back_button: "\n&8« Back to Categories"
    page:
      title: "&cReport Details\n\n"
      reporter: "&7Reporter: &a{reporter}\n"
      reported: "&7Reported: &c{reported}\n"
      reason: "&7Reason: "
      reason_hover: "&cHover to See"
      reason_hover_content: "&f{reason}"
      status: "&7Status: {color}{status}\n"
      id: "&7ID: &0{id}"
      server: "&7Server: &c{server}\n"
      click_to_change: "\n&8Click to change status\n"
      reports_category_header: "&4Reports Category\n\n"
      view_details: "&7Click to view details"
    status_options:
      pending: "&6⚠ Set as Pending\n"
      resolved: "&a✔ Mark as Resolved\n"
      rejected: "&c✘ Mark as Rejected\n"
    hover_text:
      report_for: "&7Click to report for: &f{category}"
      custom_reason: "&7Click to provide a custom reason"
      pending: "&7Click to return to pending"
      resolved: "&7Click to mark as resolved"
      rejected: "&7Click to mark as rejected"
      back: "&7Click to go back to report categories"
    main_menu:
      pending:
        title: "&6• Pending Reports"
        hover: "&7Click to view"
      resolved:
        title: "&a• Resolved Reports"
        hover: "&7Click to view"
      rejected:
        title: "&c• Rejected Reports"
        hover: "&7Click to view"
    report_list:
      title: "&4{status} Reports\n"
      total: "&7Total: {total}\n\n"
      entry: "&4{index}. &c{reported}"
      user_title: "&4Your Reports\n"
      user_entry: "&4{index}. &c{reported} {color}({status})"

  # Container GUI (Chest Interface)
  # Used when gui.type is set to "container" in config.yml.
  container:
    shared:
      separator: "&8&m                                          &r"
      navigation:
        page_indicator:
          title: "&fPage {page} of {total}"
          lore: "&7Showing {start}-{end} of {total} reports"
        previous_page:
          title: "&ePrevious Page"
          lore: "&7Go to page {page}"
        next_page:
          title: "&eNext Page"
          lore: "&7Go to page {page}"
        back_button:
          title: "&eBack"
          lore: "&7Go back to categories"

    menus:
      main_menu:
        title: "Reports Menu"
        pending:
          title: "&6Pending Reports"
          lore:
            description: "&7View all pending reports."
            action: "&eClick to view!"
        resolved:
          title: "&aResolved Reports"
          lore:
            description: "&7View all resolved reports."
            action: "&eClick to view!"
        rejected:
          title: "&cRejected Reports"
          lore:
            description: "&7View all rejected reports."
            action: "&eClick to view!"

      category_view:
        title: "{status} Reports"
        report_item:
          title: "<gradient:#AFA3FF:#AFA3FF>{reporter}</gradient> <grey>→ <gradient:#FF0000:#FF0000>{reported}</gradient>"
          lore:
            reason: "<gradient:#AFA3FF:#AFA3FF>Reason:</gradient> <white>{reason}</white>"
            status: "<gradient:#AFA3FF:#AFA3FF>Status:</gradient> <white>{status}</white>"
            id: "<gradient:#AFA3FF:#AFA3FF>ID:</gradient> <white>{id}</white>"
            server: "<gradient:#AFA3FF:#AFA3FF>Server:</gradient> <white>{server}</white>"
            action: "<gradient:#FF0000:#FF0000>Click to Manage</gradient>"

      player_reports:
        title: "Your Reports"

      reason_selector:
        title: "Report: {target}"
        info_icon:
          title: "<gradient:#AFA3FF:#AFA3FF>Reporting:</gradient> <white>{target}</white>"
          lore:
            - ""
            - "&fSelect a reason to report this player"
            - "&fClick on any icon to submit your report"
            - ""
        reason_item:
          title: "<gradient:#AFA3FF:#AFA3FF>{reason}</gradient>"
          lore:
            target: " "
            action: "&aClick to submit report"
        custom_reason_item:
          title: "&cCustom Reason"
          lore: "&7Click to enter a custom reason"

    manage_report:
      title: "Manage Report {id}"
      back_button:
        title: "&cBack"
        lore: "&7Go back to {status} Reports"
      details:
        title: "<gradient:#AFA3FF:#AFA3FF>Report Details</gradient>"
        lore:
          reporter: "<gradient:#AFA3FF:#AFA3FF>Reporter:</gradient> <white>{reporter}</white>"
          reported: "<gradient:#AFA3FF:#AFA3FF>Reported:</gradient> <white>{reported}"
          reason: "<gradient:#AFA3FF:#AFA3FF>Reason:</gradient> <white>{reason}</white>"
          status: "<gradient:#AFA3FF:#AFA3FF>Status:</gradient> <white>{status}</white>"
          id: "<gradient:#AFA3FF:#AFA3FF>ID:</gradient> <white>{id}</white>"
          server: "<gradient:#AFA3FF:#AFA3FF>Server:</gradient> <white>{server}</white>"
      pending:
        title: "&6Move to Pending"
        lore:
          description: "&7Set this report as pending for review."
          current_status: "&7Current status: &f{status}"
          action: "&6Click to change status"
      resolved:
        title: "&aMove to Resolved"
        lore:
          description: "&7Mark this report as resolved."
          current_status: "&7Current status: &f{status}"
          action: "&aClick to change status"
      rejected:
        title: "&cMove to Rejected"
        lore:
          description: "&7Reject this report as invalid."
          current_status: "&7Current status: &f{status}"
          action: "&cClick to change status"

# Common Strings
# Shared text elements, statuses, and default report reasons.
common:
  unknown: "Unknown"
  anonymous: "Anonymous"
  status:
    pending: "Pending"
    resolved: "Resolved"
    rejected: "Rejected"
  reasons:
    - "Hacking/Cheating"
    - "Harassment/Bullying"
    - "Spam/Advertisement"
    - "Griefing/Vandalism"
    - "Exploiting Bugs"
    - "Inappropriate Skin/Name"
    - "Inappropriate Language"
    - "Other"

# Chat Messages
# Direct notifications, errors, and success messages sent to players
# or staff members in standard Minecraft chat.
messages:
  # The prefix that appears before most plugin messages
  prefix: "<gradient:#AFA3FF:#AFA3FF>Reports</gradient> <grey>➡</grey>"

  error:
    no-permission: "{prefix} &cYou don't have permission to do that!"
    player-only: "{prefix} &cOnly players can use this command!"
    invalid-player: "{prefix} &cThat player does not exist!"
    invalid-group: "{prefix} &cInvalid report status group."
    report-not-found: "{prefix} &cReport not found!"
    no-reports: "{prefix} &cYou have no active reports!"
    no-status-reports: "{prefix} &cNo {status} reports found."
    status-invalid: "{prefix} &cInvalid report status! Available statuses: {statuses}"
    category-invalid: "{prefix} &cInvalid report category! Available categories: {categories}"
    custom-reason-disabled: "{prefix} &cCustom reasons are currently disabled."
    custom-reason-too-short: "{prefix} &cYour custom reason is too short! Minimum length: {min} characters"
    custom-reason-too-long: "{prefix} &cYour custom reason is too long! Maximum length: {max} characters"
    usage-report: "&cUsage: /report <player> [reason]"
    usage-viewreport: "&cUsage: /viewreport <id>"
    usage-setstatus: "&cUsage: /setreportstatus <id> to <status>"
    invalid-report-id: "&cInvalid report ID!"
    status-already-set: "&cReport is already in that status!"
    cannot-report-self: "&cYou cannot report yourself."

  success:
    report-created: "{prefix} &aYour report has been submitted successfully!"

  report:
    cooldown: "{prefix} &cYou must wait {time} before submitting another report."
    limit-reached: "{prefix} &cYou have reached the maximum number of active reports."
    notification: "{prefix} <gradient:#BEFF00:#D2FF00>{reporter}</gradient> &fhas reported <gradient:#FF0000:#FF003E>{reported}</gradient> &ffor: <gradient:#00B7FF:#0098FF>{category}</gradient>"
    status-change: "{prefix} &7Report #{id} status has been changed to {color}{status}&7."
    custom-reason-prompt: "{prefix} &fEnter your custom reason in chat. Your message will be private."

  admin:
    reload-success: "{prefix} &aConfiguration reloaded successfully!"
    reload-failure: "{prefix} &cFailed to reload configuration. Check console."
