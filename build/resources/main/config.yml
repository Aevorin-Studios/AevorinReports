# AevorinReports Configuration File

# Please Do not change the config version
config-version: 1

# Server Configuration
# The name of this server, used to identify where reports come from in a multi-server network.
# If you have multiple servers connected to the same database, give each one a unique name.
server-name: "survival"

# Database Configuration
database:
  type: "file" # Options: "mysql" (for multi-server) or "file" (local SQLite)
  mysql:
    host: "localhost"
    port: 3306
    database: "aevorin_reports"
    username: "root"
    password: "password"
  file:
    path: "database/reports.db"
  # Connection pool settings (Advanced)
  pool:
    minimum-idle: 5
    maximum-pool-size: 10
    connection-timeout: 30000 # 30 seconds

# Report Settings
reports:
  # Allow players to report themselves (self-reporting)
  allow-self-reporting: false

  # GUI type for report interface
  gui:
    type: "book" # Options: "book" (classic book gui) or "container" (chest GUI)

  # Cooldown between reports (in seconds)
  cooldown: 300

  # Maximum number of active reports per player
  max-active-reports: 3

  # Allow custom reasons in reports
  allow-custom-reasons: true

  # Custom reason constraints
  custom-reason-max-length: 100
  custom-reason-min-length: 10

  # Categories for reports - these will appear in the GUI
  categories:
    - "Hacking/Cheating"
    - "Harassment/Bullying"
    - "Spam/Advertisement"
    - "Griefing/Vandalism"
    - "Exploiting Bugs"
    - "Inappropriate Skin/Name"
    - "Inappropriate Language"
    - "Other"

# Notification Settings
notifications:
  # Send notification to staff when a new report is created
  new-report: true
  # Send notification when report status changes
  status-change: true
  # Sound to play for notifications (set to "" to disable)
  # Examples: BLOCK_NOTE_BLOCK_PLING, ENTITY_PLAYER_LEVELUP
  sound: "BLOCK_NOTE_BLOCK_PLING"
  # Chat prefix for plugin messages
  prefix: "&8[&bAevorinReports&8]&r "

# Update Checker Settings
update-checker:
  # How often to check for updates (in minutes)
  check-interval: 60
  # Whether to notify players with permission about updates on join
  notify-on-join: true

# Debug Settings
debug:
  # Enable debug logging for troubleshooting
  enabled: false
  # Log database queries (spammy, use only if needed)
  log-queries: false

# Message Customization
messages:
  reports-title: "&6Your Active Reports"
  report-format: "&7• &e#%id% &7- &f%reason%"
  no-reports: "&cYou have no active reports!"
  report-details: "&7Status: &e%status%
&7Date: &f%date%"
  report-created: "&aYour report has been submitted successfully!"
  report-cooldown: "&cYou must wait {time} before submitting another report."
  report-limit-reached: "&cYou have reached the maximum number of active reports."
  no-permission: "&cYou don't have permission to do that!"
  invalid-player: "&cThat player does not exist!"
  description-too-short: "&cYour report description is too short! Minimum length: {min}"
  description-too-long: "&cYour report description is too long! Maximum length: {max}"
  invalid-category: "&cInvalid report category! Available categories: {categories}"
  report-notification: "<red>[Reports] <yellow>{reporter} <white>has reported <red>{reported} <white>for: <yellow>{category}"
  report-status-change: "&7Report #{id} status has been changed to {color}{status}&7."
  report-status-update-success: "&aReport status updated successfully!"
  report-status-update-failed: "&cFailed to update report status!"
  report-not-found: "&cReport not found!"
  report-status-invalid: "&cInvalid report status! Available statuses: {statuses}"
  invalid-status-transition: "&cCannot change report status from {current} to {status}. Invalid transition!"
  custom-reason-prompt: "&eEnter your custom reason in chat. Your message will be private."
  custom-reason-too-short: "&cYour custom reason is too short! Minimum length: {min} characters"
  custom-reason-too-long: "&cYour custom reason is too long! Maximum length: {max} characters"
  custom-reason-disabled: "&cCustom reasons are currently disabled."

# Discord Integration Settings
discord:
  # Enable Discord bot integration
  enabled: false
  # Your Discord bot token
  bot-token: "YOUR_BOT_TOKEN_HERE"
  # The ID of the channel where reports will be sent
  channel-id: "YOUR_CHANNEL_ID_HERE"
  # The ID of the channel where logs (status changes) will be sent
  log-channel-id: "YOUR_LOG_CHANNEL_ID_HERE"
  # Role ID that can manage reports from Discord (optional)
  # If empty, anyone with MANAGE_SERVER or ADMINISTRATOR permission can manage reports
  staff-role-id: ""
  # The color of the /lookup command embed (Hex code)
  lookup-color: "#00ffff"
  # Network mode settings (for multi-server setups)
  network-mode:
    # Enable network mode - only ONE server in your network should have this enabled
    # This server will poll the database for new reports from all servers
    enabled: false
    # How often to check the database for new reports (in seconds)
    # Recommended: 5-10 seconds. Lower values = more frequent checks but more database load
    poll-interval: 10
  # Bot appearance settings
  bot-settings:
    status: "ONLINE" # ONLINE, IDLE, DND, INVISIBLE
    activity:
      type: "WATCHING" # PLAYING, WATCHING, LISTENING, COMPETING
      message: "Reports | %online_players% players online"
  # Notification settings
  notifications:
    # Title of the embed sent to Discord
    title: "New Report (#%id%)"
    # Color of the embed (Hex code)
    color: "#ff5555"
    # Footer of the embed
    footer: "AevorinReports • %date%"
